; PHP-FPM Pool Configuration for Laravel
; Optimized for containerized deployment

[www]
user = www
group = www
listen = /var/run/php/php-fpm.sock
listen.owner = www
listen.group = www
listen.mode = 0660

; Process Management - dynamic for Render
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500

; Logging
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
slowlog = /dev/stderr
request_slowlog_timeout = 10s

; Health check
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Environment
clear_env = no
